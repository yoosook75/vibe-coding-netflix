<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../img/favicon.png">
  <title>YSCine - 공지사항</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="index-page board-page">
  <div id="site-header"></div>

  <main class="board-main">
    <nav class="breadcrumb" aria-label="breadcrumb">
      <a href="../index.html" class="breadcrumb__home" aria-label="홈">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V9.5z"></path>
        </svg>
      </a>
      <span class="breadcrumb__sep">&gt;</span>
      <span class="breadcrumb__current">공지사항</span>
    </nav>

    <h1 class="board-title">공지사항</h1>

    <form class="board-search" id="board-search-form" role="search">
      <input
        type="search"
        class="board-search__input"
        id="board-search-input"
        placeholder="검색어를 입력해 주세요."
        aria-label="공지사항 검색"
      >
      <button type="submit" class="board-search__btn" aria-label="검색">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-4-4"></path>
        </svg>
      </button>
    </form>

    <div class="board-toolbar">
      <p class="board-total" id="board-total">총 0건</p>
      <label class="board-per-page">
        <span class="visually-hidden">페이지당 표시 개수</span>
        <select class="board-per-page__select" id="board-per-page" aria-label="페이지당 표시 개수">
          <option value="10" selected>10개씩</option>
          <option value="20">20개씩</option>
          <option value="30">30개씩</option>
        </select>
      </label>
    </div>

    <div class="board-list-wrap">
      <ul class="board-list" id="board-list" aria-label="공지사항 목록"></ul>
      <p class="board-empty" id="board-empty" hidden>검색 결과가 없습니다.</p>
    </div>

    <nav class="board-pagination" id="board-pagination" aria-label="페이지네이션" hidden></nav>
  </main>

  <div id="site-footer"></div>

  <script src="../js/layout.js"></script>
  <script src="js/notices-data.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
